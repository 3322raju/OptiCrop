<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction History</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<nav>

    <div class="logo">
        🌾 OptiCrop
    </div>

    <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/predict">Predict</a></li>
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/history">History</a></li>
        <li><a href="/about">About</a></li>
    </ul>

</nav>

<div class="dashboard">

<h1>Prediction History</h1>

<table class="info-table">

<tr>

<th>Crop</th>

<th>N</th>

<th>P</th>

<th>K</th>

<th>Temperature</th>

<th>Humidity</th>

<th>pH</th>

<th>Rainfall</th>

<th>Date</th>

</tr>

{% for row in history %}

<tr>

<td>{{ row[0] }}</td>

<td>{{ row[1] }}</td>

<td>{{ row[2] }}</td>

<td>{{ row[3] }}</td>

<td>{{ row[4] }}</td>

<td>{{ row[5] }}</td>

<td>{{ row[6] }}</td>

<td>{{ row[7] }}</td>

<td>{{ row[8] }}</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
